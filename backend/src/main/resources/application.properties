spring.application.name=backend

server.port=9091

spring.datasource.url=jdbc:postgresql://localhost:5432/devflowai
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:keerthi12}

jwt.secret=${JWT_SECRET:devflowai-super-secret-key-for-jwt-authentication-2026}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SMTP Configuration
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jpa.open-in-view=false

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

app.cors.allowed-origin=${FRONTEND_URL:http://localhost:4200}