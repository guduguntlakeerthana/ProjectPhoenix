<div class="navbar-wrapper">
  <div class="nav-left">
    <h2 class="page-title">Workspace</h2>
  </div>

  <div class="nav-right">
    <!-- Notification Icon -->
    <button class="nav-btn-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
      <span class="notification-indicator"></span>
    </button>

    <!-- User Profile Dropdown Toggle -->
    <div class="profile-menu">
      <button class="profile-toggle" (click)="toggleProfileDropdown()">
        <div class="user-avatar">{{ fullName() ? fullName().charAt(0).toUpperCase() : 'U' }}</div>
        <div class="user-meta">
          <span class="user-name">{{ fullName() || 'Developer' }}</span>
          <span class="user-role">{{ role() || 'User' }}</span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chevron" [class.rotated]="isProfileOpen()">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>

      <!-- Dropdown Panel -->
      <div class="profile-dropdown" *ngIf="isProfileOpen()">
        <div class="dropdown-header">
          <p class="dropdown-name">{{ fullName() }}</p>
          <p class="dropdown-email">{{ email() }}</p>
        </div>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          Profile settings
        </button>
        <button class="dropdown-item logout-btn" (click)="logout()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Sign Out
        </button>
      </div>
    </div>
  </div>
</div>
